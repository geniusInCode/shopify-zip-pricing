# Shopify app
client_id = "REPLACE_WITH_YOUR_SHOPIFY_APP_CLIENT_ID"
name = "zip-pricing-app"
handle = "zip-pricing-app"
application_url = "https://YOUR_BACKEND_HOST"
embedded = true

[access_scopes]
scopes = "read_products,write_products"

[auth]
redirect_urls = [
  "https://YOUR_BACKEND_HOST/auth/callback",
  "https://YOUR_BACKEND_HOST/auth/shopify/callback"
]

[webhooks]
api_version = "2024-10"

[app_proxy]
url = "https://YOUR_BACKEND_HOST/api"
prefix = "apps"
subpath = "zip-pricing"

[pos]
embedded = false